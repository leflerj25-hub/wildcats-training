d ankle. Hold 10 sec. Keeping both arms straight, turn your left palm up, slide it under your right hand and lock it. Push into the ground with your right hand. Take a deep breath and exhale slowly \u2014 let your left shoulder fall toward your right foot, trying to touch your ear to your instep. Hold 10 sec. Repeat 3\u20134 cycles."},{name:"Slump Stretch",img:Dt.img4,desc:"Stand with feet flat and legs straight. Stick butt back and slump forward at hips. Try to touch toes."},{name:"Slump Stretch with Cross-Over",img:Dt.img4,desc:"Cross one foot over the other. Stick hip out to stretch the lateral portion of the leg and hamstrings."},{name:"Down Dog",img:Dt.img4,desc:"Keep legs straight and heels flat on the ground. Stick butt in the air to stretch calves and hamstrings."},{name:"Kneeling Figure 4 Glute Stretch",img:Dt.img4,desc:'Start in push-up position. Bring right knee up near your right hand and left foot near your left hand. "Sit" down into your bent-knee glute and hold. Maintain a straight spine.'},{name:"Side Lying Quad Stretch",img:Dt.img5,desc:"Lie on your right side. Bring left heel to butt and grab with your left hand. Place right foot on top of left knee. Pull heel to butt, push top knee down, and press hips forward to stretch TFL, Quads, and Hip Flexors."},{name:"Kneeling Hip Flexor",img:Dt.img5,desc:"Kneel on your right leg. Tilt hips back and press hips forward. Do not compensate by leaning backwards in the lumbar spine."},{name:"Kneeling Hip Flexor with Reach",img:Dt.img6,desc:"Same as Kneeling Hip Flexor except reach up with the same-side hand."},{name:"Kneeling Hip Flexor w Back Foot Grab",img:Dt.img6,desc:"Reach back and grab the back foot. Pull your heel to your butt as you press hips forward."},{name:"Cross-Over Calf Stretch",img:Dt.img7,desc:"Start in push-up position. Cross your right foot over the left and press the heel into the ground."},{name:"Sleeper Stretch",img:Dt.img7,desc:"Lie on your right side with arm flexed and abducted to 90\xB0. Keeping shoulder blade down, let arm fall into internal rotation. Gently press on wrist with other hand. Keep head in a neutral position."},{name:"Standing Pec Stretch",img:Dt.img7,desc:"Stand against wall with arm straight. Press into the wall and turn torso away. Vary the arm angle to stretch different fibre alignments."},{name:"Standing Lat Pull",img:Dt.img7,desc:"Grab onto a squat rack or doorway. Keeping flat back, sit butt back and down until you feel the stretch in lats."}],nu=[{id:"first_blood",icon:"\u{1F525}",name:"First Rep",desc:"Complete your first workout",check:t=>Object.keys(t).length>=1},{id:"five_done",icon:"\u26A1",name:"Getting After It",desc:"Complete 5 workouts",check:t=>Object.keys(t).length>=5},{id:"ten_done",icon:"\u{1F48E}",name:"Double Digits",desc:"Complete 10 workouts",check:t=>Object.keys(t).length>=10},{id:"twenty_five",icon:"\u{1F3C5}",name:"Grinder",desc:"Complete 25 workouts",check:t=>Object.keys(t).length>=25},{id:"fifty_done",icon:"\u{1F451}",name:"Elite Athlete",desc:"Complete 50 workouts",check:t=>Object.keys(t).length>=50},{id:"sc_phase1",icon:"\u{1F4AA}",name:"May Warrior",desc:"Complete all May S&C workouts",check:t=>["d1","d2","d3","d4"].every(e=>t[`sc__may__${e}`])},{id:"sc_complete",icon:"\u{1F3CB}\uFE0F",name:"Iron Summer",desc:"Complete all S&C phases",check:t=>["may","jun","jul","aug"].every(e=>t[`sc__${e}__d1`])},{id:"dribble_done",icon:"\u{1F3C0}",name:"Ball Handler",desc:"Complete the full Dribbling program",check:t=>t.dribble__drib_f__d1&&t.dribble__drib_a__d1},{id:"shoot_done",icon:"\u{1F3AF}",name:"Sniper",desc:"Complete the full Shooting program",check:t=>t.shooting__shoot_fund__d1&&t.shooting__shoot_advanced__d1},{id:"all_three",icon:"\u{1F31F}",name:"Complete Athlete",desc:"Complete all three programs",check:t=>["sc","dribble","shooting"].every(e=>Object.keys(t).some(l=>l.startsWith(e)))},{id:"streak_3",icon:"\u{1F517}",name:"On A Roll",desc:"Achieve a 3-day workout streak",check:(t,e)=>e>=3},{id:"streak_7",i
